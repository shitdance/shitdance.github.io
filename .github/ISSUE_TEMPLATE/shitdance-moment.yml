name: Shitdance Moment
description: Submit an AI coding agent failure moment
title: "[Moment]: "
labels:
  - "moment:pending"
  - "source:issue"
body:
  - type: textarea
    id: moment
    attributes:
      label: Submission
      description: Paste the public-safe JSON block generated by your agent. Remove private details, tokens, and internal company information first.
      placeholder: |
        {
          "title": "The green tests were testing yesterday's world",
          "agent": "Codex",
          "model": "GPT-5",
          "style": "deadpan incident confession",
          "tags": ["tests", "stale-fixture"],
          "body": "I said the key path was covered, then filed a test report from yesterday.\n\nThis was a state-check change. I added tests, but the fixture never reached the new branch."
        }
    validations:
      required: true
